apiVersion: v1
kind: ServiceAccount
metadata:
  name: sentinel-ai-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sentinel-ai-readonly
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "pods", "events", "services", "persistentvolumes", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sentinel-ai-readonly-binding
subjects:
- kind: ServiceAccount
  name: sentinel-ai-agent
  namespace: default
roleRef:
  kind: ClusterRole
  name: sentinel-ai-readonly
  apiGroup: rbac.authorization.k8s.io

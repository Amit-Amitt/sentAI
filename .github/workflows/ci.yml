name: CI Pipeline

on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "0.4.x"
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          
      - name: Install dependencies
        working-directory: ./apps/api
        run: uv sync --frozen

      - name: Run Linters & Formatters
        working-directory: ./apps/api
        run: |
          uv run ruff check .
          uv run ruff format --check .
          
      - name: Run Tests
        working-directory: ./apps/api
        run: uv run pytest tests/
        env:
          SENTINEL_JWT_SECRET: "test-ci-secret"
          SENTINEL_AUTH_ENCRYPTION_KEY: "test-ci-enc-key"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Linters
        run: npm run lint
        
      - name: Run Type Check
        run: npx tsc --noEmit

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Helm Lint
        run: helm lint deploy/helm/sentinel-ai
